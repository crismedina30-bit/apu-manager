    qty: raw.r.find((r) => r[0] === a.i)?.[3] || 1,
    materials: a.m.map((m, j) => ({ id: `${a.i}_m_${j}`, desc: m[0], unit: m[1], price: m[2], qty: m[3] })),
    labor: a.l.map((l, j) => ({ id: `${a.i}_l_${j}`, desc: l[0], jornal: l[1], valHr: l[2], hrs: l[3] })),
    equipment: a.e.map((e, j) => ({ id: `${a.i}_e_${j}`, desc: e[0], unit: e[1], tarifa: e[2], qty: e[3] })),
  }));

  return { apus, catalogs: { materials, labor, equipment } };
}

// ─── UTILITIES ───
const fmt = (n) => {
  if (n == null || isNaN(n)) return "$0";
  return "$" + Math.round(n).toLocaleString("es-CO");
};

const fmtNum = (n) => {
  if (n == null || isNaN(n)) return "0";
  if (Number.isInteger(n)) return n.toLocaleString("es-CO");
  return n.toLocaleString("es-CO", { minimumFractionDigits: 2, maximumFractionDigits: 4 });
};

const calcApuTotal = (apu) => {
  const matTotal = apu.materials.reduce((s, m) => s + m.price * m.qty, 0);
  const labTotal = apu.labor.reduce((s, l) => s + l.valHr * l.hrs, 0);
  const eqTotal = apu.equipment.reduce((s, e) => {
    if (e.unit === "%MO") return s + e.tarifa * labTotal * e.qty;
    return s + e.tarifa * e.qty;
  }, 0);
  return { matTotal, labTotal, eqTotal, total: matTotal + labTotal + eqTotal };
};

// ─── EXCEL EXPORT WITH SHEETJS ───
async function downloadApuExcel(apu) {

  const wb = XLSX.utils.book_new();

  // ─── Build APU sheet data as array of arrays ───
  const pad = String(apu.id).padStart(2, "0");
  const today = new Date().toLocaleDateString("es-CO");

  // Calculate totals for formulas reference
  const matStartRow = 9; // row 9 = first material (0-indexed: 8)
  const matEndRow = matStartRow + apu.materials.length - 1;
  const matSubRow = matEndRow + 1; // subtotal row

  const moHeaderRow = matSubRow + 2; // blank + header
  const moColHeaderRow = moHeaderRow + 1;
  const moStartRow = moColHeaderRow + 1;
  const moEndRow = moStartRow + apu.labor.length - 1;
  const moSubRow = moEndRow + 1;

  const eqHeaderRow = moSubRow + 2;
  const eqColHeaderRow = eqHeaderRow + 1;
  const eqStartRow = eqColHeaderRow + 1;
  const eqEndRow = eqStartRow + apu.equipment.length - 1;
  const eqSubRow = eqEndRow + 1;

  const totalRow = eqSubRow + 2;

  const data = [];

  // Row 1: Title
  data.push(["ANÁLISIS DE PRECIOS UNITARIOS (APU)"]);
  // Row 2: Project
  data.push(["Proyecto: Vivienda Unifamiliar 2 Niveles - 300 m² - Zona Rural Medellín"]);
  // Row 3: Item + Unit
  data.push(["Ítem:", apu.id, "", "Unidad:", apu.unit]);
  // Row 4: Date
  data.push(["Fecha:", today]);
  // Row 5: Description
  data.push([apu.title]);
  // Row 6: blank
  data.push([]);
  // Row 7: Materials header
  data.push(["1. MATERIALES"]);
  // Row 8: Column headers
  data.push(["Nº", "Descripción", "Unidad", "Precio Unit. (COP)", "Cantidad", "Subtotal (COP)"]);

  // Material rows with formulas
  apu.materials.forEach((m, i) => {
    const r = matStartRow + i; // 1-indexed row in sheet
    data.push([i + 1, m.desc, m.unit, m.price, m.qty, { f: `D${r}*E${r}` }]);
  });

  // Subtotal materials
  data.push(["", "", "", "", "SUBTOTAL MATERIALES:", { f: `SUM(F${matStartRow}:F${matEndRow})` }]);

  // Blank
  data.push([]);

  // MO header
  data.push(["2. MANO DE OBRA"]);
  // MO column headers
  data.push(["Nº", "Descripción", "Jornal/día (COP)", "Valor hora (COP)", "Horas/Und", "Subtotal (COP)"]);

  // Labor rows with formulas
  apu.labor.forEach((l, i) => {
    const r = moStartRow + i;
    data.push([i + 1, l.desc, l.jornal, l.valHr, l.hrs, { f: `D${r}*E${r}` }]);
  });

  // Subtotal MO
  data.push(["", "", "", "", "SUBTOTAL MANO DE OBRA:", { f: `SUM(F${moStartRow}:F${moEndRow})` }]);

  // Blank
  data.push([]);

  // Equipment header
  data.push(["3. EQUIPOS Y HERRAMIENTA"]);
  // EQ column headers
  data.push(["Nº", "Descripción", "Unidad", "Tarifa (COP)", "Cantidad", "Subtotal (COP)"]);

  // Equipment rows with formulas
  apu.equipment.forEach((e, i) => {
    const r = eqStartRow + i;
    if (e.unit === "%MO") {
      // Herramienta menor = tarifa * subtotal MO * qty
      data.push([i + 1, e.desc, e.unit, e.tarifa, e.qty, { f: `D${r}*F${moSubRow}*E${r}` }]);
    } else {
      data.push([i + 1, e.desc, e.unit, e.tarifa, e.qty, { f: `D${r}*E${r}` }]);
    }
  });

  // Subtotal Equipment
  data.push(["", "", "", "", "SUBTOTAL EQUIPOS:", { f: `SUM(F${eqStartRow}:F${eqEndRow})` }]);

  // Blank
  data.push([]);

  // TOTAL
  data.push(["", "", "", "COSTO DIRECTO TOTAL POR " + apu.unit + ":", "", { f: `F${matSubRow}+F${moSubRow}+F${eqSubRow}` }]);

  const ws = XLSX.utils.aoa_to_sheet(data);

  // ─── Column widths ───
  ws["!cols"] = [
    { wch: 5 },   // A: Nº
    { wch: 45 },  // B: Descripción
    { wch: 12 },  // C: Unidad
    { wch: 18 },  // D: Precio/Jornal/Tarifa
    { wch: 14 },  // E: Cantidad/Horas
    { wch: 20 },  // F: Subtotal
  ];

  // ─── Merge title cells ───
  ws["!merges"] = [
    { s: { r: 0, c: 0 }, e: { r: 0, c: 5 } }, // Title row
    { s: { r: 1, c: 0 }, e: { r: 1, c: 5 } }, // Project row
    { s: { r: 4, c: 0 }, e: { r: 4, c: 5 } }, // APU description
  ];

  // ─── Number formatting for COP columns ───
  const copFmt = '#,##0';
  const allRows = data.length;
  for (let r = 0; r < allRows; r++) {
    // Format columns D, E, F (indices 3,4,5) as numbers where applicable
    for (let c = 3; c <= 5; c++) {
      const cellRef = XLSX.utils.encode_cell({ r, c });
      if (ws[cellRef] && (typeof ws[cellRef].v === "number" || ws[cellRef].f)) {
        if (!ws[cellRef].z) ws[cellRef].z = copFmt;
      }
    }
  }

  XLSX.utils.book_append_sheet(wb, ws, `APU-${pad}`);

  // ─── Download ───
  XLSX.writeFile(wb, `APU-${pad}_${apu.title.slice(0, 30).replace(/[^a-zA-Z0-9áéíóúñÁÉÍÓÚÑ ]/g, "").trim().replace(/ /g, "_")}.xlsx`);
}

// ─── MAIN APP ───
function App() {
  const initial = useMemo(() => parseData(RAW_DATA), []);
  const [apus, setApus] = useState(initial.apus);
  const [catalogs, setCatalogs] = useState(initial.catalogs);
  const [tab, setTab] = useState("resumen");
  const [selectedApu, setSelectedApu] = useState(null);
  const [search, setSearch] = useState("");
  const [aiu, setAiu] = useState({ admin: 13, imp: 3, util: 3 });
  const [catalogTab, setCatalogTab] = useState("materials");
  const [showNewApu, setShowNewApu] = useState(false);

  // Calculate resumen data
  const resumenData = useMemo(() => {
    return apus.map((a) => {
      const t = calcApuTotal(a);
      return { ...a, valUnit: t.total, valTot: t.total * a.qty };
    });
  }, [apus]);

  const filteredResumen = useMemo(() => {
    if (!search) return resumenData;
    const s = search.toLowerCase();
    return resumenData.filter((a) => a.title.toLowerCase().includes(s) || String(a.id).includes(s));
  }, [resumenData, search]);

  const totals = useMemo(() => {
    const costoDirec = resumenData.reduce((s, a) => s + a.valTot, 0);
    const adminVal = costoDirec * (aiu.admin / 100);
    const impVal = costoDirec * (aiu.imp / 100);
    const utilVal = costoDirec * (aiu.util / 100);
    const aiuVal = adminVal + impVal + utilVal;
    const iva = utilVal * 0.19;
    return { costoDirec, adminVal, impVal, utilVal, aiuVal, iva, total: costoDirec + aiuVal + iva };
  }, [resumenData, aiu]);

  const updateApuQty = useCallback((apuId, qty) => {
    setApus((prev) => prev.map((a) => (a.id === apuId ? { ...a, qty: Math.max(0, qty) } : a)));
  }, []);

  const openApu = useCallback((apuId) => {
    setSelectedApu(apuId);
    setTab("detalle");
  }, []);

  const updateApuMaterial = useCallback((apuId, matIdx, field, value) => {
    setApus((prev) =>
      prev.map((a) => {
        if (a.id !== apuId) return a;
        const mats = [...a.materials];
        mats[matIdx] = { ...mats[matIdx], [field]: value };
        return { ...a, materials: mats };
      })
    );
  }, []);

  const updateApuLabor = useCallback((apuId, labIdx, field, value) => {
    setApus((prev) =>
      prev.map((a) => {
        if (a.id !== apuId) return a;
        const labs = [...a.labor];
        labs[labIdx] = { ...labs[labIdx], [field]: value };
        return { ...a, labor: labs };
      })
    );
  }, []);

  const updateApuEquip = useCallback((apuId, eqIdx, field, value) => {
    setApus((prev) =>
      prev.map((a) => {
        if (a.id !== apuId) return a;
        const eqs = [...a.equipment];
        eqs[eqIdx] = { ...eqs[eqIdx], [field]: value };
        return { ...a, equipment: eqs };
      })
    );
  }, []);

  const addMaterialToApu = useCallback((apuId, catMat) => {
    setApus((prev) =>
      prev.map((a) => {
        if (a.id !== apuId) return a;
        return {
          ...a,
          materials: [...a.materials, { id: `${a.id}_m_${Date.now()}`, desc: catMat.desc, unit: catMat.unit, price: catMat.price, qty: 1 }],
        };
      })
    );
  }, []);

  const addLaborToApu = useCallback((apuId, catLab) => {
    setApus((prev) =>
      prev.map((a) => {
        if (a.id !== apuId) return a;
        return {
          ...a,
          labor: [...a.labor, { id: `${a.id}_l_${Date.now()}`, desc: catLab.desc, jornal: catLab.jornal, valHr: catLab.valHr, hrs: 1 }],
        };
      })
    );
  }, []);

  const addEquipToApu = useCallback((apuId, catEq) => {
    setApus((prev) =>
      prev.map((a) => {
        if (a.id !== apuId) return a;
        return {
          ...a,
          equipment: [...a.equipment, { id: `${a.id}_e_${Date.now()}`, desc: catEq.desc, unit: catEq.unit, tarifa: catEq.tarifa, qty: 1 }],
        };
      })
    );
  }, []);

  const removeFromApu = useCallback((apuId, section, idx) => {
    setApus((prev) =>
      prev.map((a) => {
        if (a.id !== apuId) return a;
        const arr = [...a[section]];
        arr.splice(idx, 1);
        return { ...a, [section]: arr };
      })
    );
  }, []);

  const addCatalogItem = useCallback((type, item) => {
    setCatalogs((prev) => ({
      ...prev,
      [type]: [...prev[type], { ...item, id: `${type.charAt(0)}_${Date.now()}` }],
    }));
  }, []);

  const removeCatalogItem = useCallback((type, idx) => {
    setCatalogs((prev) => ({
      ...prev,
      [type]: prev[type].filter((_, i) => i !== idx),
    }));
  }, []);

  const updateCatalogItem = useCallback((type, idx, field, value) => {
    setCatalogs((prev) => {
      const items = [...prev[type]];
      items[idx] = { ...items[idx], [field]: value };
      return { ...prev, [type]: items };
    });
  }, []);

  const createNewApu = useCallback((newApu) => {
    const maxId = Math.max(...apus.map((a) => a.id), 0);
    setApus((prev) => [...prev, { ...newApu, id: maxId + 1, qty: 1 }]);
    setShowNewApu(false);
  }, [apus]);

  const deleteApu = useCallback((apuId) => {
    setApus((prev) => prev.filter((a) => a.id !== apuId));
    if (selectedApu === apuId) {
      setSelectedApu(null);
      setTab("resumen");
    }
  }, [selectedApu]);

  const currentApu = useMemo(() => apus.find((a) => a.id === selectedApu), [apus, selectedApu]);

  return (
    <div style={{ fontFamily: "'DM Sans', 'Segoe UI', sans-serif", background: "#0f1117", color: "#e4e4e7", minHeight: "100vh", fontSize: "13px" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
      
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #1a1d27 0%, #0f1117 100%)", borderBottom: "1px solid #2a2d3a", padding: "16px 24px" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: "#f4f4f5", letterSpacing: "-0.02em" }}>
              <span style={{ color: "#f59e0b" }}>APU</span> Manager
            </h1>
            <p style={{ margin: "2px 0 0", fontSize: 11, color: "#71717a" }}>Vivienda Unifamiliar 2 Niveles — Medellín, Antioquia</p>
          </div>
          <div style={{ display: "flex", gap: 8, fontSize: 11, color: "#a1a1aa" }}>
            <span style={{ background: "#1e2030", padding: "4px 10px", borderRadius: 6, border: "1px solid #2a2d3a" }}>{apus.length} APUs</span>
            <span style={{ background: "#1e2030", padding: "4px 10px", borderRadius: 6, border: "1px solid #2a2d3a" }}>Total: {fmt(totals.total)}</span>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 2, padding: "8px 24px 0", borderBottom: "1px solid #2a2d3a", background: "#13151e" }}>
        {[
          { key: "resumen", label: "Resumen", icon: Icons.list },
          { key: "detalle", label: "Detalle APU", icon: Icons.cube },
          { key: "catalogos", label: "Catálogos", icon: Icons.wrench },
        ].map((t) => (
          <button
            key={t.key}
            onClick={() => setTab(t.key)}
            style={{
              display: "flex", alignItems: "center", gap: 6, padding: "10px 16px",
              background: tab === t.key ? "#1a1d27" : "transparent",
              color: tab === t.key ? "#f59e0b" : "#71717a",
              border: "none", borderBottom: tab === t.key ? "2px solid #f59e0b" : "2px solid transparent",
              cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit",
              transition: "all 0.15s",
            }}
          >
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: "16px 24px 80px" }}>
        {tab === "resumen" && (
          <ResumenView
            data={filteredResumen}
            totals={totals}
            aiu={aiu}
            setAiu={setAiu}
            search={search}
            setSearch={setSearch}
            onOpen={openApu}
            onQtyChange={updateApuQty}
            onNew={() => setShowNewApu(true)}
            onDelete={deleteApu}
          />
        )}
        {tab === "detalle" && (
          <DetalleView
            apu={currentApu}
            apus={apus}
            catalogs={catalogs}
            onSelect={setSelectedApu}
            onUpdateMat={updateApuMaterial}
            onUpdateLab={updateApuLabor}
            onUpdateEq={updateApuEquip}
            onAddMat={addMaterialToApu}
            onAddLab={addLaborToApu}
            onAddEq={addEquipToApu}
            onRemove={removeFromApu}
            onBack={() => setTab("resumen")}
          />
        )}
        {tab === "catalogos" && (
          <CatalogosView
            catalogs={catalogs}
            catalogTab={catalogTab}
            setCatalogTab={setCatalogTab}
            onAdd={addCatalogItem}
            onRemove={removeCatalogItem}
            onUpdate={updateCatalogItem}
          />
        )}
      </div>

      {/* New APU Modal */}
      {showNewApu && (
        <NewApuModal catalogs={catalogs} onCreate={createNewApu} onClose={() => setShowNewApu(false)} />
      )}
    </div>
  );
}

// ─── EDITABLE CELL ───
function EditCell({ value, onChange, type = "number", style = {} }) {
  const [editing, setEditing] = useState(false);
  const [tmp, setTmp] = useState(value);
  const ref = useRef(null);

  useEffect(() => { if (editing && ref.current) ref.current.focus(); }, [editing]);

  if (!editing) {
    return (
      <span
        onClick={() => { setTmp(value); setEditing(true); }}
        style={{ cursor: "pointer", borderBottom: "1px dashed #3f3f46", padding: "2px 4px", borderRadius: 3, ...style }}
        title="Clic para editar"
      >
        {type === "money" ? fmt(value) : fmtNum(value)}
      </span>
    );
  }

  return (
    <input
      ref={ref}
      type="number"
      step="any"
      value={tmp}
      onChange={(e) => setTmp(e.target.value)}
      onBlur={() => { onChange(parseFloat(tmp) || 0); setEditing(false); }}
      onKeyDown={(e) => { if (e.key === "Enter") { onChange(parseFloat(tmp) || 0); setEditing(false); } if (e.key === "Escape") setEditing(false); }}
      style={{
        width: 80, padding: "2px 4px", background: "#1e2030", border: "1px solid #f59e0b",
        borderRadius: 4, color: "#f4f4f5", fontSize: 12, fontFamily: "'JetBrains Mono', monospace", outline: "none",
      }}
    />
  );
}

            <tr style={{ background: "#1a1d27" }}>

                <th key={i} style={{ padding: "10px 8px", textAlign: i > 2 ? "right" : "left", color: "#a1a1aa", fontWeight: 600, fontSize: 11, borderBottom: "1px solid #2a2d3a", whiteSpace: "nowrap" }}>
                  {h}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {pageData.map((a) => (
              <tr key={a.id} style={{ borderBottom: "1px solid #1e2030", transition: "background 0.1s" }}
                onMouseEnter={(e) => (e.currentTarget.style.background = "#1a1d27")}
                onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}
              >
                <td style={{ padding: "8px", color: "#f59e0b", fontFamily: "'JetBrains Mono', monospace", fontWeight: 600 }}>{a.id}</td>
                <td style={{ padding: "8px", cursor: "pointer", maxWidth: 400 }} onClick={() => onOpen(a.id)}>
                  <span style={{ color: "#e4e4e7", borderBottom: "1px solid transparent", transition: "border 0.15s" }}
                    onMouseEnter={(e) => (e.target.style.borderBottom = "1px solid #f59e0b")}
                    onMouseLeave={(e) => (e.target.style.borderBottom = "1px solid transparent")}
                  >{a.title}</span>
                </td>
                <td style={{ padding: "8px", color: "#a1a1aa" }}>{a.unit}</td>
                <td style={{ padding: "8px", textAlign: "right" }}>
                  <EditCell value={a.qty} onChange={(v) => onQtyChange(a.id, v)} />
                </td>
                <td style={{ padding: "8px", textAlign: "right", fontFamily: "'JetBrains Mono', monospace", color: "#a1a1aa" }}>{fmt(a.valUnit)}</td>
                <td style={{ padding: "8px", textAlign: "right", fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, color: "#e4e4e7" }}>{fmt(a.valTot)}</td>
                <td style={{ padding: "8px", textAlign: "center" }}>
                  <button onClick={() => onDelete(a.id)} style={{ background: "none", border: "none", color: "#52525b", cursor: "pointer", padding: 4 }} title="Eliminar APU">
                    {Icons.trash}
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Pagination */}
      {totalPages > 1 && (
        <div style={{ display: "flex", justifyContent: "center", gap: 4, marginTop: 12 }}>
          {Array.from({ length: totalPages }, (_, i) => (
            <button key={i} onClick={() => setPage(i)}
              style={{
                padding: "4px 10px", borderRadius: 4, border: "1px solid #2a2d3a", fontSize: 11, cursor: "pointer",
                fontFamily: "inherit",
                background: page === i ? "#f59e0b" : "#1a1d27", color: page === i ? "#000" : "#a1a1aa",
              }}
            >{i + 1}</button>
          ))}
        </div>
      )}

      {/* Footer AIU */}
      <div style={{ marginTop: 16, background: "#1a1d27", borderRadius: 8, border: "1px solid #2a2d3a", padding: 16 }}>
        <h3 style={{ margin: "0 0 12px", fontSize: 13, fontWeight: 700, color: "#f59e0b" }}>Resumen Financiero</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: "6px 24px", fontSize: 12 }}>
          <span>Costo Directo</span>
          <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", fontWeight: 600 }}>{fmt(totals.costoDirec)}</span>
          
          <span style={{ display: "flex", alignItems: "center", gap: 6 }}>Administración (<EditCell value={aiu.admin} onChange={(v) => setAiu((p) => ({ ...p, admin: v }))} />%)</span>
          <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", color: "#a1a1aa" }}>{fmt(totals.adminVal)}</span>
          
          <span style={{ display: "flex", alignItems: "center", gap: 6 }}>Imprevistos (<EditCell value={aiu.imp} onChange={(v) => setAiu((p) => ({ ...p, imp: v }))} />%)</span>
          <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", color: "#a1a1aa" }}>{fmt(totals.impVal)}</span>
          
          <span style={{ display: "flex", alignItems: "center", gap: 6 }}>Utilidad (<EditCell value={aiu.util} onChange={(v) => setAiu((p) => ({ ...p, util: v }))} />%)</span>
          <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", color: "#a1a1aa" }}>{fmt(totals.utilVal)}</span>
          
          <span style={{ color: "#a1a1aa" }}>AIU Total</span>
          <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", color: "#a1a1aa" }}>{fmt(totals.aiuVal)}</span>
          
          <span style={{ color: "#a1a1aa" }}>IVA (19% s/ Utilidad)</span>
          <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", color: "#a1a1aa" }}>{fmt(totals.iva)}</span>
          
          <span style={{ fontSize: 14, fontWeight: 700, color: "#f59e0b", paddingTop: 8, borderTop: "1px solid #2a2d3a" }}>VALOR TOTAL</span>
          <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", fontSize: 14, fontWeight: 700, color: "#f59e0b", paddingTop: 8, borderTop: "1px solid #2a2d3a" }}>{fmt(totals.total)}</span>
        </div>
      </div>
    </div>
  );
}

// ─── DETALLE APU VIEW ───
function DetalleView({ apu, apus, catalogs, onSelect, onUpdateMat, onUpdateLab, onUpdateEq, onAddMat, onAddLab, onAddEq, onRemove, onBack }) {
  const [addType, setAddType] = useState(null); // 'materials' | 'labor' | 'equipment'
  const [catSearch, setCatSearch] = useState("");

  if (!apu) {
    return (
      <div>
        <p style={{ color: "#71717a", marginBottom: 12 }}>Selecciona un APU del resumen o elige uno aquí:</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          {apus.map((a) => {
            const t = calcApuTotal(a);
            return (
              <button key={a.id} onClick={() => onSelect(a.id)}
                style={{ display: "flex", justifyContent: "space-between", padding: "8px 12px", background: "#1a1d27", border: "1px solid #2a2d3a", borderRadius: 6, color: "#e4e4e7", cursor: "pointer", fontSize: 12, fontFamily: "inherit", textAlign: "left" }}
              >
                <span><span style={{ color: "#f59e0b", fontWeight: 600 }}>APU-{String(a.id).padStart(2, "0")}</span> {a.title}</span>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", color: "#a1a1aa" }}>{fmt(t.total)}/{a.unit}</span>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  const t = calcApuTotal(apu);

  const renderCatalogPicker = (type) => {
    const items = type === "materials" ? catalogs.materials : type === "labor" ? catalogs.labor : catalogs.equipment;
    const filtered = catSearch ? items.filter((i) => i.desc.toLowerCase().includes(catSearch.toLowerCase())) : items;
    return (
      <div style={{ background: "#13151e", border: "1px solid #f59e0b", borderRadius: 8, padding: 12, marginTop: 8 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: "#f59e0b" }}>Seleccionar del catálogo</span>
          <button onClick={() => { setAddType(null); setCatSearch(""); }} style={{ background: "none", border: "none", color: "#71717a", cursor: "pointer" }}>{Icons.x}</button>
        </div>
        <input
          value={catSearch} onChange={(e) => setCatSearch(e.target.value)} placeholder="Buscar..."
          style={{ width: "100%", padding: "6px 8px", background: "#1a1d27", border: "1px solid #2a2d3a", borderRadius: 4, color: "#e4e4e7", fontSize: 11, fontFamily: "inherit", marginBottom: 6, boxSizing: "border-box", outline: "none" }}
        />
        <div style={{ maxHeight: 150, overflowY: "auto" }}>
          {filtered.slice(0, 20).map((item, i) => (
            <button key={i}
              onClick={() => {
                if (type === "materials") onAddMat(apu.id, item);
                else if (type === "labor") onAddLab(apu.id, item);
                else onAddEq(apu.id, item);
                setAddType(null); setCatSearch("");
              }}
              style={{ display: "block", width: "100%", padding: "6px 8px", background: "transparent", border: "none", borderBottom: "1px solid #1e2030", color: "#e4e4e7", cursor: "pointer", fontSize: 11, fontFamily: "inherit", textAlign: "left" }}
            >
              {item.desc} <span style={{ color: "#71717a" }}>— {type === "labor" ? fmt(item.jornal) + "/día" : type === "materials" ? fmt(item.price) + "/" + item.unit : fmt(item.tarifa) + "/" + item.unit}</span>
            </button>
          ))}
        </div>
      </div>
    );
  };

  return (
    <div>
      {/* Nav */}
      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 16, flexWrap: "wrap" }}>
        <button onClick={onBack} style={btnStyle("#2a2d3a", "#e4e4e7")}>{Icons.back} Resumen</button>
        <select value={apu.id} onChange={(e) => onSelect(Number(e.target.value))}
          style={{ padding: "6px 10px", background: "#1a1d27", border: "1px solid #2a2d3a", borderRadius: 6, color: "#e4e4e7", fontSize: 12, fontFamily: "inherit", outline: "none" }}
        >
          {apus.map((a) => <option key={a.id} value={a.id}>APU-{String(a.id).padStart(2, "0")}: {a.title.slice(0, 50)}</option>)}
        </select>
      </div>

      {/* Header */}
      <div style={{ background: "#1a1d27", borderRadius: 8, border: "1px solid #2a2d3a", padding: 16, marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
          <div>
            <span style={{ fontSize: 11, color: "#f59e0b", fontWeight: 600 }}>APU-{String(apu.id).padStart(2, "0")}</span>
            <h2 style={{ margin: "4px 0 0", fontSize: 15, fontWeight: 700, color: "#f4f4f5" }}>{apu.title}</h2>
          </div>
          <div style={{ textAlign: "right" }}>
            <span style={{ fontSize: 11, color: "#71717a" }}>Unidad: <b style={{ color: "#e4e4e7" }}>{apu.unit}</b></span>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#f59e0b", fontFamily: "'JetBrains Mono', monospace" }}>{fmt(t.total)}</div>
          </div>
        </div>
        <div style={{ marginTop: 12, borderTop: "1px solid #2a2d3a", paddingTop: 12 }}>
          <button onClick={() => downloadApuExcel(apu)} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 16px", background: "linear-gradient(135deg, #16a34a, #15803d)", color: "#fff", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 2px 8px #16a34a44", transition: "transform 0.1s, box-shadow 0.1s" }} onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = "0 4px 12px #16a34a66"; }} onMouseLeave={(e) => { e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "0 2px 8px #16a34a44"; }}>
            {Icons.download} Descargar APU en Excel (formulado)
          </button>
          <span style={{ marginLeft: 10, fontSize: 10, color: "#52525b" }}>Archivo .xlsx con fórmulas automáticas</span>
        </div>
      </div>

      {/* Materials */}
      <SectionCard title="1. MATERIALES" color="#3b82f6" total={t.matTotal}>
        <table style={tblStyle}>
          <thead>
            <tr>
              {["Descripción", "Und", "Precio Unit.", "Cantidad", "Subtotal", ""].map((h, i) => (
                <th key={i} style={thStyle(i > 1)}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {apu.materials.map((m, i) => (
              <tr key={m.id} style={trStyle}>
                <td style={tdStyle()}>{m.desc}</td>
                <td style={tdStyle()}>{m.unit}</td>
                <td style={tdStyle(true)}><EditCell value={m.price} onChange={(v) => onUpdateMat(apu.id, i, "price", v)} type="money" /></td>
                <td style={tdStyle(true)}><EditCell value={m.qty} onChange={(v) => onUpdateMat(apu.id, i, "qty", v)} /></td>
                <td style={{ ...tdStyle(true), fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{fmt(m.price * m.qty)}</td>
                <td style={tdStyle(true)}>
                  <button onClick={() => onRemove(apu.id, "materials", i)} style={delBtnStyle}>{Icons.trash}</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <button onClick={() => setAddType(addType === "materials" ? null : "materials")} style={btnStyle("#3b82f6", "#fff", true)}>{Icons.plus} Agregar material</button>
        {addType === "materials" && renderCatalogPicker("materials")}
      </SectionCard>

      {/* Labor */}
      <SectionCard title="2. MANO DE OBRA" color="#10b981" total={t.labTotal}>
        <table style={tblStyle}>
          <thead>
            <tr>
              {["Descripción", "Jornal/día", "Valor Hora", "Horas/Und", "Subtotal", ""].map((h, i) => (
                <th key={i} style={thStyle(i > 0)}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {apu.labor.map((l, i) => (
              <tr key={l.id} style={trStyle}>
                <td style={tdStyle()}>{l.desc}</td>
                <td style={tdStyle(true)}><EditCell value={l.jornal} onChange={(v) => onUpdateLab(apu.id, i, "jornal", v)} type="money" /></td>
                <td style={tdStyle(true)}><EditCell value={l.valHr} onChange={(v) => onUpdateLab(apu.id, i, "valHr", v)} type="money" /></td>
                <td style={tdStyle(true)}><EditCell value={l.hrs} onChange={(v) => onUpdateLab(apu.id, i, "hrs", v)} /></td>
                <td style={{ ...tdStyle(true), fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{fmt(l.valHr * l.hrs)}</td>
                <td style={tdStyle(true)}>
                  <button onClick={() => onRemove(apu.id, "labor", i)} style={delBtnStyle}>{Icons.trash}</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <button onClick={() => setAddType(addType === "labor" ? null : "labor")} style={btnStyle("#10b981", "#fff", true)}>{Icons.plus} Agregar M.O.</button>
        {addType === "labor" && renderCatalogPicker("labor")}
      </SectionCard>

      {/* Equipment */}
      <SectionCard title="3. EQUIPOS Y HERRAMIENTA" color="#8b5cf6" total={t.eqTotal}>
        <table style={tblStyle}>
          <thead>
            <tr>
              {["Descripción", "Und", "Tarifa", "Cantidad", "Subtotal", ""].map((h, i) => (
                <th key={i} style={thStyle(i > 1)}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {apu.equipment.map((e, i) => (
              <tr key={e.id} style={trStyle}>
                <td style={tdStyle()}>{e.desc}</td>
                <td style={tdStyle()}>{e.unit}</td>
                <td style={tdStyle(true)}><EditCell value={e.tarifa} onChange={(v) => onUpdateEq(apu.id, i, "tarifa", v)} type={e.unit === "%MO" ? "number" : "money"} /></td>
                <td style={tdStyle(true)}><EditCell value={e.qty} onChange={(v) => onUpdateEq(apu.id, i, "qty", v)} /></td>
                <td style={{ ...tdStyle(true), fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>
                  {fmt(e.unit === "%MO" ? e.tarifa * t.labTotal * e.qty : e.tarifa * e.qty)}
                </td>
                <td style={tdStyle(true)}>
                  <button onClick={() => onRemove(apu.id, "equipment", i)} style={delBtnStyle}>{Icons.trash}</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <button onClick={() => setAddType(addType === "equipment" ? null : "equipment")} style={btnStyle("#8b5cf6", "#fff", true)}>{Icons.plus} Agregar equipo</button>
        {addType === "equipment" && renderCatalogPicker("equipment")}
      </SectionCard>

      {/* Total bar */}
      <div style={{ background: "linear-gradient(135deg, #f59e0b22, #f59e0b11)", border: "1px solid #f59e0b44", borderRadius: 8, padding: 16, display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12 }}>
        <span style={{ fontWeight: 700, fontSize: 14 }}>COSTO DIRECTO TOTAL POR {apu.unit}</span>
        <span style={{ fontSize: 20, fontWeight: 700, color: "#f59e0b", fontFamily: "'JetBrains Mono', monospace" }}>{fmt(t.total)}</span>
      </div>
    </div>
  );
}

// ─── SECTION CARD ───
function SectionCard({ title, color, total, children }) {
  return (
    <div style={{ background: "#13151e", borderRadius: 8, border: `1px solid ${color}33`, marginBottom: 12, overflow: "hidden" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: `${color}11`, borderBottom: `1px solid ${color}33` }}>
        <span style={{ fontWeight: 700, fontSize: 12, color }}>{title}</span>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, fontSize: 13, color }}>{fmt(total)}</span>
      </div>
      <div style={{ padding: 12 }}>{children}</div>
    </div>
  );
}

// ─── CATALOGOS VIEW ───
function CatalogosView({ catalogs, catalogTab, setCatalogTab, onAdd, onRemove, onUpdate }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newItem, setNewItem] = useState({});
  const [search, setSearch] = useState("");

  const tabs = [
    { key: "materials", label: "Materiales", icon: Icons.cube, count: catalogs.materials.length, color: "#3b82f6" },
    { key: "labor", label: "Mano de Obra", icon: Icons.users, count: catalogs.labor.length, color: "#10b981" },
    { key: "equipment", label: "Equipos", icon: Icons.wrench, count: catalogs.equipment.length, color: "#8b5cf6" },
  ];

  const currentItems = catalogs[catalogTab] || [];
  const filtered = search ? currentItems.filter((i) => i.desc.toLowerCase().includes(search.toLowerCase())) : currentItems;

  const handleAdd = () => {
    if (!newItem.desc) return;
    if (catalogTab === "materials") {
      onAdd("materials", { desc: newItem.desc, unit: newItem.unit || "und", price: parseFloat(newItem.price) || 0 });
    } else if (catalogTab === "labor") {
      const jornal = parseFloat(newItem.jornal) || 0;
      onAdd("labor", { desc: newItem.desc, jornal, valHr: jornal / 8 });
    } else {
      onAdd("equipment", { desc: newItem.desc, unit: newItem.unit || "día", tarifa: parseFloat(newItem.tarifa) || 0 });
    }
    setNewItem({});
    setShowAdd(false);
  };

  return (
    <div>
      {/* Catalog tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
        {tabs.map((t) => (
          <button key={t.key} onClick={() => { setCatalogTab(t.key); setSearch(""); setShowAdd(false); }}
            style={{
              display: "flex", alignItems: "center", gap: 6, padding: "8px 14px",
              background: catalogTab === t.key ? `${t.color}22` : "#1a1d27",
              border: `1px solid ${catalogTab === t.key ? t.color : "#2a2d3a"}`,
              borderRadius: 6, color: catalogTab === t.key ? t.color : "#71717a",
              cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit",
            }}
          >
            {t.icon} {t.label} <span style={{ background: `${t.color}33`, padding: "1px 6px", borderRadius: 10, fontSize: 10 }}>{t.count}</span>
          </button>
        ))}
      </div>

      {/* Toolbar */}
      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
        <div style={{ position: "relative", flex: 1, minWidth: 200 }}>
          <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: "#52525b" }}>{Icons.search}</span>
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar en catálogo..."
            style={{ width: "100%", padding: "8px 12px 8px 32px", background: "#1a1d27", border: "1px solid #2a2d3a", borderRadius: 6, color: "#e4e4e7", fontSize: 12, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }}
          />
        </div>
        <button onClick={() => setShowAdd(!showAdd)} style={btnStyle("#f59e0b", "#000")}>{Icons.plus} Nuevo</button>
      </div>

      {/* Add form */}
      {showAdd && (
        <div style={{ background: "#1a1d27", border: "1px solid #f59e0b", borderRadius: 8, padding: 14, marginBottom: 12, display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div style={{ flex: 2, minWidth: 150 }}>
            <label style={labelStyle}>Descripción</label>
            <input value={newItem.desc || ""} onChange={(e) => setNewItem((p) => ({ ...p, desc: e.target.value }))} style={inputStyle} />
          </div>
          {catalogTab === "materials" && (
            <>
              <div style={{ flex: 1, minWidth: 80 }}>
                <label style={labelStyle}>Unidad</label>
                <input value={newItem.unit || ""} onChange={(e) => setNewItem((p) => ({ ...p, unit: e.target.value }))} style={inputStyle} />
              </div>
              <div style={{ flex: 1, minWidth: 100 }}>
                <label style={labelStyle}>Precio Unit.</label>
                <input type="number" value={newItem.price || ""} onChange={(e) => setNewItem((p) => ({ ...p, price: e.target.value }))} style={inputStyle} />
              </div>
            </>
          )}
          {catalogTab === "labor" && (
            <div style={{ flex: 1, minWidth: 120 }}>
              <label style={labelStyle}>Jornal/día (COP)</label>
              <input type="number" value={newItem.jornal || ""} onChange={(e) => setNewItem((p) => ({ ...p, jornal: e.target.value }))} style={inputStyle} />
            </div>
          )}
          {catalogTab === "equipment" && (
            <>
              <div style={{ flex: 1, minWidth: 80 }}>
                <label style={labelStyle}>Unidad</label>
                <input value={newItem.unit || ""} onChange={(e) => setNewItem((p) => ({ ...p, unit: e.target.value }))} style={inputStyle} />
              </div>
              <div style={{ flex: 1, minWidth: 100 }}>
                <label style={labelStyle}>Tarifa</label>
                <input type="number" value={newItem.tarifa || ""} onChange={(e) => setNewItem((p) => ({ ...p, tarifa: e.target.value }))} style={inputStyle} />
              </div>
            </>
          )}
          <button onClick={handleAdd} style={btnStyle("#f59e0b", "#000")}>{Icons.check} Guardar</button>
          <button onClick={() => { setShowAdd(false); setNewItem({}); }} style={btnStyle("#2a2d3a", "#a1a1aa")}>{Icons.x} Cancelar</button>
        </div>
      )}

      {/* Catalog table */}
      <div style={{ overflowX: "auto", borderRadius: 8, border: "1px solid #2a2d3a" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ background: "#1a1d27" }}>
              <th style={thStyle(false)}>Nº</th>
              <th style={thStyle(false)}>Descripción</th>
              {catalogTab === "materials" && <><th style={thStyle(false)}>Unidad</th><th style={thStyle(true)}>Precio Unit.</th></>}
              {catalogTab === "labor" && <><th style={thStyle(true)}>Jornal/día</th><th style={thStyle(true)}>Valor Hora</th></>}
              {catalogTab === "equipment" && <><th style={thStyle(false)}>Unidad</th><th style={thStyle(true)}>Tarifa</th></>}
              <th style={thStyle(true)}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((item, i) => {
              const realIdx = currentItems.indexOf(item);
              return (
                <tr key={i} style={trStyle}>
                  <td style={{ ...tdStyle(), color: "#52525b", fontFamily: "'JetBrains Mono', monospace" }}>{realIdx + 1}</td>
                  <td style={tdStyle()}>{item.desc}</td>
                  {catalogTab === "materials" && (
                    <>
                      <td style={tdStyle()}>{item.unit}</td>
                      <td style={tdStyle(true)}>
                        <EditCell value={item.price} onChange={(v) => onUpdate("materials", realIdx, "price", v)} type="money" />
                      </td>
                    </>
                  )}
                  {catalogTab === "labor" && (
                    <>
                      <td style={tdStyle(true)}>
                        <EditCell value={item.jornal} onChange={(v) => { onUpdate("labor", realIdx, "jornal", v); onUpdate("labor", realIdx, "valHr", v / 8); }} type="money" />
                      </td>
                      <td style={{ ...tdStyle(true), fontFamily: "'JetBrains Mono', monospace", color: "#a1a1aa" }}>{fmt(item.valHr)}</td>
                    </>
                  )}
                  {catalogTab === "equipment" && (
                    <>
                      <td style={tdStyle()}>{item.unit}</td>
                      <td style={tdStyle(true)}>
                        <EditCell value={item.tarifa} onChange={(v) => onUpdate("equipment", realIdx, "tarifa", v)} type={item.unit === "%MO" ? "number" : "money"} />
                      </td>
                    </>
                  )}
                  <td style={tdStyle(true)}>
                    <button onClick={() => onRemove(catalogTab, realIdx)} style={delBtnStyle}>{Icons.trash}</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── NEW APU MODAL ───
function NewApuModal({ catalogs, onCreate, onClose }) {
  const [title, setTitle] = useState("");
  const [unit, setUnit] = useState("m²");
  const [materials, setMaterials] = useState([]);
  const [labor, setLabor] = useState([]);
  const [equipment, setEquipment] = useState([]);
  const [addSection, setAddSection] = useState(null);
  const [catSearch, setCatSearch] = useState("");

  const handleSubmit = () => {
    if (!title.trim()) return;
    onCreate({ title: title.trim(), unit, materials, labor, equipment });
  };

  const addFromCatalog = (section, item) => {
    if (section === "materials") {
      setMaterials((p) => [...p, { id: `new_m_${Date.now()}`, desc: item.desc, unit: item.unit, price: item.price, qty: 1 }]);
    } else if (section === "labor") {
      setLabor((p) => [...p, { id: `new_l_${Date.now()}`, desc: item.desc, jornal: item.jornal, valHr: item.valHr, hrs: 1 }]);
    } else {
      setEquipment((p) => [...p, { id: `new_e_${Date.now()}`, desc: item.desc, unit: item.unit, tarifa: item.tarifa, qty: 1 }]);
    }
    setAddSection(null);
    setCatSearch("");
  };

  const matTotal = materials.reduce((s, m) => s + m.price * m.qty, 0);
  const labTotal = labor.reduce((s, l) => s + l.valHr * l.hrs, 0);
  const eqTotal = equipment.reduce((s, e) => s + (e.unit === "%MO" ? e.tarifa * labTotal * e.qty : e.tarifa * e.qty), 0);

  const renderPicker = (section) => {
    const items = section === "materials" ? catalogs.materials : section === "labor" ? catalogs.labor : catalogs.equipment;
    const filtered = catSearch ? items.filter((i) => i.desc.toLowerCase().includes(catSearch.toLowerCase())) : items;
    return (
      <div style={{ background: "#0f1117", border: "1px solid #f59e0b", borderRadius: 6, padding: 10, marginTop: 6 }}>
        <input value={catSearch} onChange={(e) => setCatSearch(e.target.value)} placeholder="Buscar..." style={{ ...inputStyle, marginBottom: 6 }} />
        <div style={{ maxHeight: 120, overflowY: "auto" }}>
          {filtered.slice(0, 15).map((item, i) => (
            <button key={i} onClick={() => addFromCatalog(section, item)}
              style={{ display: "block", width: "100%", padding: "5px 6px", background: "transparent", border: "none", borderBottom: "1px solid #1e2030", color: "#e4e4e7", cursor: "pointer", fontSize: 11, fontFamily: "inherit", textAlign: "left" }}
            >{item.desc}</button>
          ))}
        </div>
      </div>
    );
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, padding: 16 }}>
      <div style={{ background: "#13151e", border: "1px solid #2a2d3a", borderRadius: 12, padding: 20, width: "100%", maxWidth: 600, maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: "#f59e0b" }}>Crear Nuevo APU</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#71717a", cursor: "pointer" }}>{Icons.x}</button>
        </div>

        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          <div style={{ flex: 3 }}>
            <label style={labelStyle}>Descripción del APU</label>
            <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="Ej: CONCRETO ESTRUCTURAL 3000 psi COLUMNAS" style={inputStyle} />
          </div>
          <div style={{ flex: 1 }}>
            <label style={labelStyle}>Unidad</label>
            <input value={unit} onChange={(e) => setUnit(e.target.value)} style={inputStyle} />
          </div>
        </div>

        {/* Materials */}
        <div style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "#3b82f6" }}>Materiales ({materials.length})</span>
            <button onClick={() => setAddSection(addSection === "materials" ? null : "materials")} style={btnStyle("#3b82f6", "#fff", true)}>{Icons.plus}</button>
          </div>
          {materials.map((m, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: 11, borderBottom: "1px solid #1e2030" }}>
              <span>{m.desc}</span>
              <span style={{ color: "#a1a1aa" }}>{fmt(m.price * m.qty)}</span>
            </div>
          ))}
          {addSection === "materials" && renderPicker("materials")}
        </div>

        {/* Labor */}
        <div style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "#10b981" }}>Mano de Obra ({labor.length})</span>
            <button onClick={() => setAddSection(addSection === "labor" ? null : "labor")} style={btnStyle("#10b981", "#fff", true)}>{Icons.plus}</button>
          </div>
          {labor.map((l, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: 11, borderBottom: "1px solid #1e2030" }}>
              <span>{l.desc}</span>
              <span style={{ color: "#a1a1aa" }}>{fmt(l.valHr * l.hrs)}</span>
            </div>
          ))}
          {addSection === "labor" && renderPicker("labor")}
        </div>

        {/* Equipment */}
        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: "#8b5cf6" }}>Equipos ({equipment.length})</span>
            <button onClick={() => setAddSection(addSection === "equipment" ? null : "equipment")} style={btnStyle("#8b5cf6", "#fff", true)}>{Icons.plus}</button>
          </div>
          {equipment.map((e, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: 11, borderBottom: "1px solid #1e2030" }}>
              <span>{e.desc}</span>
              <span style={{ color: "#a1a1aa" }}>{fmt(e.unit === "%MO" ? e.tarifa * labTotal * e.qty : e.tarifa * e.qty)}</span>
            </div>
          ))}
          {addSection === "equipment" && renderPicker("equipment")}
        </div>

        {/* Total */}
        <div style={{ background: "#1a1d27", borderRadius: 6, padding: 12, marginBottom: 12, display: "flex", justifyContent: "space-between" }}>
          <span style={{ fontWeight: 600 }}>Costo Directo</span>
          <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: "#f59e0b" }}>{fmt(matTotal + labTotal + eqTotal)}</span>
        </div>

        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
          <button onClick={onClose} style={btnStyle("#2a2d3a", "#a1a1aa")}>Cancelar</button>
          <button onClick={handleSubmit} style={btnStyle("#f59e0b", "#000")}>Crear APU</button>
        </div>
      </div>
    </div>
  );
}

// ─── SHARED STYLES ───
const btnStyle = (bg, color, small = false) => ({
  display: "inline-flex", alignItems: "center", gap: 4,
  padding: small ? "4px 10px" : "7px 14px",
  background: bg, color, border: "none", borderRadius: 6,
  fontSize: small ? 11 : 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
  whiteSpace: "nowrap",
});

const tblStyle = { width: "100%", borderCollapse: "collapse", fontSize: 11 };
const thStyle = (right) => ({ padding: "6px 8px", textAlign: right ? "right" : "left", color: "#71717a", fontWeight: 600, fontSize: 10, borderBottom: "1px solid #2a2d3a", whiteSpace: "nowrap" });
const tdStyle = (right) => ({ padding: "6px 8px", textAlign: right ? "right" : "left", borderBottom: "1px solid #1e2030" });
const trStyle = { transition: "background 0.1s" };
const delBtnStyle = { background: "none", border: "none", color: "#52525b", cursor: "pointer", padding: 2 };
const labelStyle = { display: "block", fontSize: 10, color: "#71717a", fontWeight: 600, marginBottom: 3 };
const inputStyle = { width: "100%", padding: "6px 8px", background: "#1a1d27", border: "1px solid #2a2d3a", borderRadius: 4, color: "#e4e4e7", fontSize: 12, fontFamily: "inherit", outline: "none", boxSizing: "border-box" };


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
